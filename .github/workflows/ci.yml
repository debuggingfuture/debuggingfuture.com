name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: false

env:
  CI: true
  TZ: Asia/Hong_Kong

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build and smoke test
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build with Astro
        run: pnpm run build
      - name: Smoke test build output
        run: |
          set -euo pipefail
          required=(
            "dist/index.html"
            "dist/about/index.html"
            "dist/blog/index.html"
            "dist/hack/index.html"
            "dist/life/index.html"
            "dist/rss.xml"
            "dist/sitemap-index.xml"
            "dist/_worker.js"
          )
          missing=0
          for f in "${required[@]}"; do
            if [[ ! -s "$f" ]]; then
              echo "::error::missing or empty: $f"
              missing=1
            fi
          done
          if [[ "$missing" -ne 0 ]]; then exit 1; fi
          grep -q "<title>Debug 未來</title>" dist/index.html \
            || { echo "::error::homepage title missing"; exit 1; }
          grep -q "</rss>" dist/rss.xml \
            || { echo "::error::rss.xml malformed"; exit 1; }
          echo "smoke test passed"
      - name: Upload build artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 1

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages
    steps:
      - uses: actions/checkout@v4
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=debuggingfuture-com --branch=master
